<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 300" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .title { font-size: 14px; font-weight: 700; }
    .label { font-size: 12px; font-weight: 600; }
    .sublabel { font-size: 11px; }
    .desc { font-size: 10px; }
    .box { rx: 8; ry: 8; stroke-width: 2; }
    .arrow { stroke-width: 2; stroke-linecap: round; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1e1e2e; }
      .box-parent { fill: #3b3654; stroke: #8b5cf6; }
      .box-noop { fill: #2a2a3c; stroke: #6b7280; stroke-dasharray: 6 4; }
      .box-memo { fill: #1a3328; stroke: #22c55e; }
      .arrow-ok { stroke: #22c55e; }
      .arrow-fail { stroke: #ef4444; stroke-dasharray: 6 4; }
      .title { fill: #e2e8f0; }
      .label { fill: #e2e8f0; }
      .sublabel { fill: #94a3b8; }
      .desc { fill: #94a3b8; }
      .tag-ok { fill: #166534; stroke: #22c55e; }
      .tag-fail { fill: #7f1d1d; stroke: #ef4444; }
      .tag-text { fill: #fef2f2; }
      .tag-ok-text { fill: #f0fdf4; }
      .tag-warn { fill: #713f12; stroke: #f59e0b; }
      .tag-warn-text { fill: #fefce8; }
      .note-bg { fill: #2a2a3c; stroke: #3a3a4c; }
      .note-text { fill: #94a3b8; }
      .watermark { fill: #94a3b8; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .box-parent { fill: #ede9fe; stroke: #8b5cf6; }
      .box-noop { fill: #f8fafc; stroke: #cbd5e1; stroke-dasharray: 6 4; }
      .box-memo { fill: #f0fdf4; stroke: #22c55e; }
      .arrow-ok { stroke: #22c55e; }
      .arrow-fail { stroke: #ef4444; stroke-dasharray: 6 4; }
      .title { fill: #1e293b; }
      .label { fill: #334155; }
      .sublabel { fill: #64748b; }
      .desc { fill: #64748b; }
      .tag-ok { fill: #dcfce7; stroke: #22c55e; }
      .tag-fail { fill: #fee2e2; stroke: #ef4444; }
      .tag-text { fill: #991b1b; }
      .tag-ok-text { fill: #166534; }
      .tag-warn { fill: #fef9c3; stroke: #f59e0b; }
      .tag-warn-text { fill: #854d0e; }
      .note-bg { fill: #f8fafc; stroke: #e2e8f0; }
      .note-text { fill: #64748b; }
      .watermark { fill: #94a3b8; }
    }
  </style>

  <rect width="380" height="300" class="bg" rx="12"/>


  <text x="368" y="14" text-anchor="end" class="watermark" style="font-size: 10px; font-weight: 500; opacity: 0.4;">bbinyaslog</text>

  <rect x="110" y="16" width="160" height="44" class="box box-parent"/>
  <text x="190" y="35" text-anchor="middle" class="label">Parent</text>
  <text x="190" y="50" text-anchor="middle" class="sublabel">state 변경 → 리렌더링</text>

  <line x1="190" y1="60" x2="190" y2="82" class="arrow arrow-fail"/>

  <rect x="110" y="88" width="160" height="36" class="box box-noop"/>
  <text x="190" y="111" text-anchor="middle" class="sublabel">일반 함수 선언</text>

  <rect x="278" y="94" width="84" height="22" class="tag-warn" rx="6" stroke-width="1"/>
  <text x="320" y="109" text-anchor="middle" class="desc tag-warn-text">매번 새 참조</text>

  <line x1="190" y1="124" x2="190" y2="148" class="arrow arrow-fail"/>

  <text x="190" y="168" text-anchor="middle" class="sublabel">onClick={handleClick}</text>

  <line x1="190" y1="176" x2="190" y2="200" class="arrow arrow-fail"/>

  <rect x="90" y="204" width="200" height="44" class="box box-memo"/>
  <text x="190" y="223" text-anchor="middle" class="label">React.memo(Child)</text>
  <text x="190" y="238" text-anchor="middle" class="sublabel">props 비교 → "다르다!"</text>

  <rect x="298" y="212" width="70" height="22" class="tag-fail" rx="6" stroke-width="1"/>
  <text x="333" y="227" text-anchor="middle" class="desc tag-text">무력화!</text>

  <rect x="30" y="262" width="320" height="28" class="note-bg" rx="6" stroke-width="1"/>
  <text x="190" y="280" text-anchor="middle" class="desc note-text">비교는 하지만, 참조가 매번 달라서 항상 "다르다" 판정</text>
</svg>
