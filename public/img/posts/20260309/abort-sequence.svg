<svg viewBox="0 0 720 445" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AbortController의 abort() 동작 원리를 보여주는 시퀀스 다이어그램">
  <style>
    text { font-family: ui-monospace, monospace; }
    .label { font-size: 13px; font-weight: 600; }
    .desc { font-size: 11px; }
    .time { font-size: 10px; }
    .title { font-size: 11px; font-weight: 600; }
  </style>

  <!-- 배경 -->
  <rect width="720" height="420" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />

  <!-- 라이프라인 -->
  <line x1="140" y1="60" x2="140" y2="390" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 4" />
  <line x1="360" y1="60" x2="360" y2="390" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 4" />
  <line x1="580" y1="60" x2="580" y2="390" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 4" />

  <!-- 헤더 -->
  <rect x="70" y="20" width="140" height="32" rx="6" fill="#3b82f6" />
  <text x="140" y="41" text-anchor="middle" fill="white" class="label">Browser</text>

  <rect x="290" y="20" width="140" height="32" rx="6" fill="#64748b" />
  <text x="360" y="41" text-anchor="middle" fill="white" class="label">Network</text>

  <rect x="510" y="20" width="140" height="32" rx="6" fill="#10b981" />
  <text x="580" y="41" text-anchor="middle" fill="white" class="label">Server</text>

  <!-- 1. 요청 전송 -->
  <text x="20" y="90" fill="#94a3b8" class="time">t=0</text>
  <line x1="140" y1="85" x2="358" y2="85" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />
  <text x="249" y="78" text-anchor="middle" fill="#3b82f6" class="desc">HTTP Request</text>

  <!-- 2. 네트워크 전달 -->
  <line x1="362" y1="115" x2="578" y2="115" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-gray)" />
  <text x="470" y="108" text-anchor="middle" fill="#64748b" class="desc">TCP 전달</text>

  <!-- 3. 서버 처리 중 -->
  <rect x="565" y="130" width="30" height="80" rx="4" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1" />
  <text x="620" y="175" fill="#10b981" class="desc">처리 중...</text>

  <!-- 4. abort() 호출 -->
  <text x="20" y="180" fill="#94a3b8" class="time">t=1</text>
  <rect x="50" y="167" width="80" height="22" rx="4" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1" />
  <text x="90" y="182" text-anchor="middle" fill="#ef4444" class="desc" font-weight="700">abort()</text>

  <!-- 5. 브라우저 → 네트워크: 연결 끊기 -->
  <line x1="140" y1="205" x2="358" y2="205" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrow-red)" />
  <text x="249" y="198" text-anchor="middle" fill="#ef4444" class="desc">응답 대기 중단</text>

  <!-- X 표시 - 연결 끊김 -->
  <text x="352" y="230" text-anchor="middle" fill="#ef4444" font-size="18" font-weight="bold">✕</text>

  <!-- 6. AbortError -->
  <rect x="50" y="248" width="180" height="26" rx="4" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1" />
  <text x="140" y="265" text-anchor="middle" fill="#ef4444" class="desc">Promise reject → AbortError</text>

  <!-- 7. 서버는 처리 완료 -->
  <text x="20" y="310" fill="#94a3b8" class="time">t=2</text>
  <rect x="565" y="210" width="30" height="80" rx="4" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1" />
  <text x="620" y="260" fill="#10b981" class="desc">처리 완료</text>

  <!-- 8. 서버 응답 시도 → 실패 -->
  <line x1="578" y1="305" x2="370" y2="305" stroke="#10b981" stroke-width="2" stroke-dasharray="6 3" opacity="0.5" />
  <text x="470" y="298" text-anchor="middle" fill="#10b981" class="desc" opacity="0.6">Response</text>
  <text x="365" y="310" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="bold">✕</text>
  <text x="470" y="325" text-anchor="middle" fill="#94a3b8" class="desc">클라이언트가 응답을 수신하지 않음</text>

  <!-- 핵심 박스 -->
  <rect x="50" y="350" width="620" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" />
  <text x="360" y="372" text-anchor="middle" fill="#92400e" class="title">abort()는 서버에 취소 신호를 보내는 게 아닙니다.</text>
  <text x="360" y="390" text-anchor="middle" fill="#92400e" class="desc">클라이언트가 응답 대기를 중단하고, fetch Promise를 reject합니다. 서버는 이미 처리를 끝냈을 수 있습니다.</text>

  <!-- 워터마크 -->
  <text x="700" y="435" text-anchor="end" fill="#1e293b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" letter-spacing="1">bbinya's log</text>

  <!-- 화살표 마커 -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6" />
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b" />
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef4444" />
    </marker>
  </defs>
</svg>
